name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: server/uv.lock
      - name: Install dependencies (CPU torch)
        run: uv sync --locked
      - name: Run tests
        run: uv run pytest -q

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore signing keystore
        if: github.event_name != 'pull_request'
        run: echo "$ANDROID_KEYSTORE_B64" | base64 -d > /tmp/thorspeak-release.jks
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
      - name: Build release APK
        run: ./gradlew :app:assembleRelease
        working-directory: app
        env:
          THORSPEAK_KEYSTORE: /tmp/thorspeak-release.jks
          THORSPEAK_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          THORSPEAK_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      - uses: actions/upload-artifact@v4
        with:
          name: thorspeak-apk
          path: app/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [server-tests, android-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: thorspeak-apk
      - name: Rename APK
        run: mv app-release.apk thorspeak-${{ github.ref_name }}.apk
      - uses: softprops/action-gh-release@v2
        with:
          files: thorspeak-*.apk
          generate_release_notes: true
